<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background-color: #768399;
        }

        header {
            display: flex;
            width: 70%;
            margin: 30px auto;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            padding: 20px 100px;
            color: white;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 50px;
        }

        h1 {
            margin: 0;
            color: #ffd700;
        }

        .menu {
            display: flex;
            align-items: center;
        }

        .menu a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            padding: 8px 15px;
            border-radius: 20px;
            transition: 0.3s;
        }

        .menu a:hover {
            background-color: #ffd700;
            color: #1e3c72;
        }

        #theme-btn {
            background: #ffd700;
            color: #1e3c72;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            margin-left: 20px;
            transition: all 0.3s ease;
            /* box-shadow: 0 4px 10px rgba(255, 215, 0, 0.4); */
        }

        #theme-btn:hover {
            background: white;
            color: #ff9800;
            transform: rotate(180deg) scale(1.1);
            /* box-shadow: 0 6px 15px rgba(255, 215, 0, 0.6); */
        }

        .dark-theme {
            background-color: #1a1a1a;
        }

        .dark-theme header {
            background: #2c2c2c;
        }

        .dark-theme h1 {
            color: #ffd700;
        }

        .dark-theme .menu a {
            color: white;
        }

        .dark-theme .menu a:hover {
            background: #ffd700;
            color: #000;
        }

        .dark-theme #theme-btn {
            background: #ffd700;
            color: #000;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {

            header {
                width: 90%;
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                border-radius: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .menu {
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
            }

            .menu a {
                margin: 5px;
                padding: 8px 12px;
                font-size: 14px;
            }

            #theme-btn {
                width: 40px;
                height: 40px;
                font-size: 16px;
                margin-left: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <div>
            <h1>My Website</h1>
        </div>
        <nav class="menu">

            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
            <button id="theme-btn">
                <i class="fa-solid fa-sun"></i>
            </button>


        </nav>
    </header>


    <script src="./app.js"></script>
</body>

</html>
