<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call | Apply | Bind</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f5f7fa;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        table {
            width: 100%;
            min-width: 900px;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, .1);
        }

        thead {
            background: #0d6efd;
            color: #fff;
        }

        th,
        td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            font-size: 16px;
            letter-spacing: .5px;
        }

        td {
            font-size: 15px;
        }

        tbody tr:nth-child(even) {
            background: #f8f9fa;
        }

        tbody tr:hover {
            background: #e7f1ff;
            transition: .3s;
        }

        @media (max-width:768px) {

            body {
                padding: 15px;
            }

            h1 {
                font-size: 28px;
            }

            th,
            td {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>
    <center>
        <h1>Call | Apply | Bind</h1>
    </center>


    <table>
        <thead>
            <tr>
                <th>Id</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Email</th>
                <th>Gender</th>
                <th>Role</th>
                <th>Phone</th>
            </tr>
        </thead>

        <tbody id="table">
        </tbody>
    </table>

    <script src="./app.js"></script>
</body>

</html>
