<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            gap: 20px;
            font-family: Arial, sans-serif;
        }

        .dice-container {
            display: flex;
            gap: 100px;
        }

        #dice1,
        #dice2 {
            width: 100px;
            height: 100px;
            border: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            border-radius: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="dice-container">
        <div id="dice1">
            <h4>0</h4>
        </div>

        <div id="dice2">
            <h4>0</h4>
        </div>
    </div>

    <button id="rollBtn">Roll The Dice</button>

    <script>
        let dice1 = document.querySelector("#dice1");
        let dice2 = document.querySelector("#dice2");
        let dice1Value = document.querySelector("h4");
        let dice2Value = document.querySelector("h4");
        let button = document.querySelector("button");

        button.addEventListener("click", () => {
            let random1 = Math.floor(Math.random() * 7);
            let random2 = Math.floor(Math.random() * 7);

            setTimeout(() => {

                dice1Value.textContent = "";
                dice2Value.textContent = "";


                

                dice1Value.textContent = random1;
                dice2Value.textContent = random2;
            }, 2000);







        });
    </script>

</body>

</html>
