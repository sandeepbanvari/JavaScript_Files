<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beginner Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <form id="registrationForm">
            <h2>Create Account</h2>

            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" placeholder="Enter your first name" name="firstName">
                <p class="error-msg" id="firstNameError"></p>
            </div> 

            <div class="input-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" placeholder="Enter your last name" name="lastName">
                <p class="error-msg" id="lastNameError"></p>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="e.g. name@example.com" name="email">
                <p class="error-msg" id="emailError"></p>
            </div>

            <div class="input-group">
                <label for="mobile">Mobile Number</label>
                <input type="number" id="mobile" placeholder="Enter 10-digit number" name="mobile">
                <p class="error-msg" id="mobileError"></p>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Create a password" name="password">
                <p class="error-msg" id="passwordError"></p>
            </div>

            <button type="submit" class="submit-btn">Register</button>
            <p>Already have an account? <a href="./login.html">Login</a></p>
        </form>
    </div>

    <script src="app.js"></script>
</body>
</html>
