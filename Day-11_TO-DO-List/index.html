<style>
    /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1200px;
}

.todo-box{
    background:#111827;
    border-radius:20px;
    padding:30px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.todo-box h1{
    text-align:center;
    margin-bottom:25px;
    color:#22d3ee;
    font-size:2rem;
    font-weight:700;
}

/* Layout */
.input-group{
    display:grid;
    grid-template-columns:350px 1fr;
    gap:25px;
}

.input-group > div:first-child{
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* Inputs */
input,
textarea{
    width:100%;
    padding:14px;
    border:2px solid #374151;
    border-radius:12px;
    outline:none;
    font-size:15px;
    font-family:'Poppins',sans-serif;
    background:#1f2937;
    color:white;
    transition:0.3s;
}

input::placeholder,
textarea::placeholder{
    color:#9ca3af;
}

input:focus,
textarea:focus{
    border-color:#22d3ee;
    box-shadow:0 0 12px rgba(34,211,238,0.3);
}

textarea{
    min-height:120px;
    resize:none;
}

/* Button */
#addBtn{
    background:#22d3ee;
    color:#111827;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

#addBtn:hover{
    background:#06b6d4;
    transform:translateY(-2px);
}

/* Task Area */
.task-list{
    background:#1f2937;
    border-radius:16px;
    padding:20px;
    min-height:500px;
}

#task-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:15px;
}

/* Empty State */
.empty-state{
    text-align:center;
    padding:50px 20px;
}

.empty-state img{
    width:140px;
    margin-bottom:15px;
}

.empty-state h3{
    color:#ffffff;
    margin-bottom:10px;
}

.empty-state p{
    color:#cbd5e1;
}

/* Task Card */
#task-list li{
    background:#111827;
    border-left:5px solid #22d3ee;
    border-radius:15px;
    padding:18px;
    box-shadow:0 5px 15px rgba(0,0,0,0.25);
    transition:0.3s;
}

#task-list li:hover{
    transform:translateY(-4px);
}

.task{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.task h3{
    color:#ffffff;
    font-size:20px;
}

.task p{
    color:#d1d5db;
    line-height:1.6;
}

.task span{
    color:#9ca3af;
    font-size:14px;
}

/* Icons */
.icons{
    display:flex;
    justify-content:flex-end;
    gap:18px;
    margin-top:15px;
    padding-top:12px;
    border-top:1px solid #374151;
}

.icons i{
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.edit-icon{
    color:#22c55e;
}

.edit-icon:hover{
    transform:scale(1.2);
}

.delete-icon{
    color:#ef4444;
}

.delete-icon:hover{
    transform:scale(1.2);
}

/* Scrollbar */
.task-list::-webkit-scrollbar{
    width:8px;
}

.task-list::-webkit-scrollbar-thumb{
    background:#22d3ee;
    border-radius:10px;
}

.task-list::-webkit-scrollbar-track{
    background:#374151;
}

/* Responsive */
@media(max-width:900px){

    .input-group{
        grid-template-columns:1fr;
    }

    .task-list{
        min-height:350px;
    }
}

@media(max-width:500px){

    .todo-box{
        padding:20px;
    }

    .todo-box h1{
        font-size:1.6rem;
    }

    input,
    textarea,
    #addBtn{
        font-size:14px;
    }

    .icons{
        justify-content:center;
    }

    .task h3{
        font-size:18px;
    }

    .task p{
        font-size:14px;
    }
}
</style>
</head>

<body>

    <div class="container">
        <div class="todo-box">
            <h1>To-Do List</h1>


            <div class="input-group">
                <div>
                    <input type="text" id="title" placeholder="Task Title">

                    <textarea id="description" placeholder="Task Description"></textarea>

                    <input type="datetime-local" id="date">


                    <button id="addBtn">Add Task</button>
                </div>

                <div class="task-list">
                    <div id="task-container">
                        <div class="empty-state" id="empty-state">
                            <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" alt="No Tasks">
                            <h3>No Tasks Yet</h3>
                            <p>Add your first task to get started!</p>
                        </div>
                        <ul id="task-list"></ul>
                    </div>

                </div>

            </div>
        </div>

        


    </div>

    <script src="./app.js"></script>
</body>

</html>
